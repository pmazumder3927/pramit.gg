<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pramit.gg — favicon explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,600&family=Work+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4ecd8; --card:#fbf6e9; --ink:#23201b; --ink-soft:#46413a; --ink-faint:#7a7264;
    --line:#cdbf9f; --orange:#c75623; --orange-hot:#ff6b3d; --purple:#5b56a8; --purple-soft:#7c77c6;
    --rust:#b04929; --night:#100f17; --night-card:#211d20; --cream:#f2ebde;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Work Sans',system-ui,sans-serif;
    background-image:radial-gradient(rgba(0,0,0,.025) 1px,transparent 1px);background-size:4px 4px;}
  header{padding:46px 40px 10px}
  h1{font-family:'Fraunces',serif;font-weight:900;font-size:40px;margin:0;letter-spacing:-.02em}
  .sub{font-family:'Caveat',cursive;font-size:24px;color:var(--ink-faint);margin-top:2px}
  .legend{font-size:13px;color:var(--ink-soft);margin-top:14px;max-width:760px;line-height:1.5}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;padding:30px 40px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;
    box-shadow:0 1px 0 rgba(0,0,0,.03),0 14px 30px -22px rgba(0,0,0,.4);position:relative}
  .num{position:absolute;top:-11px;left:14px;background:var(--ink);color:var(--cream);font-family:'Fraunces',serif;
    font-weight:600;font-size:13px;width:26px;height:26px;border-radius:50%;display:grid;place-items:center}
  .name{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin:2px 0 1px}
  .desc{font-size:11.5px;color:var(--ink-faint);line-height:1.4;min-height:46px}
  .stage{display:flex;align-items:flex-end;gap:14px;margin:10px 0 12px;padding:14px 12px;border-radius:10px;
    background:var(--paper);border:1px dashed var(--line)}
  .stage.dark{background:var(--night);border-color:#2a2740}
  .s64{width:64px;height:64px}.s32{width:32px;height:32px}.s16{width:16px;height:16px}
  .stage .lab{font-size:9px;color:var(--ink-faint);text-align:center;margin-top:4px}
  .stage.dark .lab{color:#8a849a}
  .col{display:flex;flex-direction:column;align-items:center}
  /* fake browser tab */
  .tab{display:inline-flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);
    border-bottom:none;border-radius:9px 9px 0 0;padding:7px 12px 8px;font-size:12px;color:var(--ink-soft);
    max-width:170px;margin-top:6px}
  .tab img,.tab svg{width:16px;height:16px;flex:0 0 16px}
  .tab span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .appicon{width:46px;height:46px;border-radius:11px;overflow:hidden;box-shadow:0 6px 14px -6px rgba(0,0,0,.5)}
  svg{display:block}
</style>
</head>
<body>
<header>
  <h1>favicon explorations</h1>
  <div class="sub">pramit.gg — twenty directions, true to the sketchbook</div>
  <div class="legend">Each shown at 64 / 32 / 16&nbsp;px on light paper, then 32&nbsp;px on midnight, plus a tab + rounded app-icon mock. Palette: sunset orange <b>#c75623/#ff6b3d</b>, flower purple <b>#5b56a8/#7c77c6</b>, ink <b>#23201b</b>, paper <b>#f4ecd8</b>.</div>
</header>
<div class="grid" id="grid"></div>

<script>
// ---- shared bits ----
const PAPER='#f4ecd8',CARD='#fbf6e9',CREAM='#f2ebde',INK='#23201b',ORANGE='#c75623',HOT='#ff6b3d',
      PURPLE='#5b56a8',PSOFT='#7c77c6',RUST='#b04929',NIGHT='#100f17';

// A library of icon factories. Each returns an inner-SVG string drawn in a 0 0 100 100 box.
const icons = [
{
  name:'Ink-gesture p', tag:'sketch',
  desc:'A single brush-pen stroke forms the p — one confident gesture, like it was drawn in the margin. Most "hand" of all.',
  bg:c=>``,
  draw:(fg,inkOnly)=>`
    <path d="M30 22 C30 22 30 86 30 86" fill="none" stroke="${fg}" stroke-width="11" stroke-linecap="round"/>
    <path d="M30 38 C46 26 74 30 74 52 C74 74 44 74 32 60" fill="none" stroke="${fg}" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="68" cy="80" r="6.5" fill="${ORANGE}"/>`,
},
{
  name:'Rubber stamp p.', tag:'stamp',
  desc:'Hand-lettered p. inside a rounded ink stamp with a roughened, under-inked edge. Carries the scrapbook "Stamp" motif.',
  draw:(fg)=>`
    <rect x="10" y="10" width="80" height="80" rx="18" fill="none" stroke="${ORANGE}" stroke-width="6"
      stroke-dasharray="2 3.4" opacity=".9"/>
    <text x="50" y="70" font-family="Caveat,cursive" font-weight="700" font-size="62"
      text-anchor="middle" fill="${ORANGE}">p.</text>`,
},
{
  name:'Sunset orb', tag:'symbol',
  desc:'"The orange of a sunset on my grandpa\'s shoulders." A burning sun half-sunk past a horizon line. Pure feeling, no letter.',
  draw:(fg)=>`
    <defs><radialGradient id="sun" cx="50%" cy="58%" r="60%">
      <stop offset="0" stop-color="#ffd9a8"/><stop offset=".45" stop-color="${HOT}"/><stop offset="1" stop-color="${RUST}"/>
    </radialGradient></defs>
    <circle cx="50" cy="55" r="30" fill="url(#sun)"/>
    <rect x="6" y="62" width="88" height="9" rx="4.5" fill="${fg}"/>
    <rect x="6" y="62" width="88" height="9" rx="4.5" fill="url(#sun)" opacity=".0"/>`,
},
{
  name:'Sun + horizon p', tag:'symbol',
  desc:'The sunset orb doubling as the bowl of a lowercase p — symbol and letter at once. Reads as a glyph and a memory.',
  draw:(fg)=>`
    <defs><radialGradient id="sun2" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#ffd9a8"/><stop offset=".5" stop-color="${HOT}"/><stop offset="1" stop-color="${RUST}"/>
    </radialGradient></defs>
    <rect x="24" y="20" width="11" height="62" rx="5.5" fill="${fg}"/>
    <circle cx="55" cy="48" r="24" fill="url(#sun2)"/>
    <circle cx="55" cy="48" r="9" fill="${PAPER}"/>`,
},
{
  name:'Pressed flower', tag:'symbol',
  desc:'"The soft purple of my first crush\'s favorite flower." A tiny five-petal bloom pressed into the page. The purple half of the soul.',
  draw:(fg)=>`
    <g transform="translate(50 50)">
      ${[0,72,144,216,288].map(a=>`<ellipse cx="0" cy="-22" rx="11" ry="20" fill="${PSOFT}" transform="rotate(${a})"/>`).join('')}
      <circle cx="0" cy="0" r="9" fill="${ORANGE}"/>
    </g>`,
},
{
  name:'Two-accent split p', tag:'wordmark',
  desc:'A bold p. on a square split diagonally — sunset orange meeting flower purple. The whole two-accent system in one mark.',
  draw:(fg)=>`
    <defs><clipPath id="sq"><rect x="6" y="6" width="88" height="88" rx="22"/></clipPath></defs>
    <g clip-path="url(#sq)">
      <rect x="6" y="6" width="88" height="88" fill="${ORANGE}"/>
      <path d="M6 94 L94 6 L94 94 Z" fill="${PURPLE}"/>
    </g>
    <text x="48" y="72" font-family="Fraunces,serif" font-weight="900" font-size="64"
      text-anchor="middle" fill="${CREAM}">p.</text>`,
},
{
  name:'Taped corner p', tag:'sketch',
  desc:'A paper chip with a strip of washi tape across the corner, p. handwritten on it. The literal sketchbook collage motif.',
  draw:(fg)=>`
    <rect x="16" y="16" width="68" height="68" rx="4" fill="${CARD}" stroke="${'#cdbf9f'}" stroke-width="1.5"/>
    <g transform="rotate(-32 24 24)"><rect x="2" y="14" width="44" height="16" fill="${HOT}" opacity=".82"/></g>
    <text x="50" y="68" font-family="Caveat,cursive" font-weight="700" font-size="52"
      text-anchor="middle" fill="${INK}">p.</text>`,
},
{
  name:'Fountain nib', tag:'symbol',
  desc:'A fountain-pen nib — the instrument behind every ink mark on the site. Slit + breather hole, orange-purple tipping.',
  draw:(fg)=>`
    <path d="M50 14 L70 60 C70 78 30 78 30 60 Z" fill="${fg}"/>
    <path d="M50 14 L70 60 C70 78 30 78 30 60 Z" fill="none" stroke="${fg}" stroke-width="2"/>
    <line x1="50" y1="40" x2="50" y2="74" stroke="${PAPER}" stroke-width="3.4"/>
    <circle cx="50" cy="50" r="5.2" fill="${PAPER}"/>
    <path d="M40 74 L50 86 L60 74 Z" fill="${ORANGE}"/>`,
},
{
  name:'Ink blot p.', tag:'sketch',
  desc:'A splattered ink drop with the p. reversed out of it — the happy-accident energy of "dumb websites on library computers."',
  draw:(fg)=>`
    <path d="M50 12 C66 12 84 26 84 48 C84 70 70 86 50 86 C28 86 16 70 16 50 C16 30 34 12 50 12Z"
      fill="${fg}"/>
    <circle cx="84" cy="30" r="4.5" fill="${fg}"/><circle cx="20" cy="78" r="3.4" fill="${fg}"/>
    <circle cx="86" cy="64" r="2.6" fill="${fg}"/>
    <text x="48" y="68" font-family="Fraunces,serif" font-weight="900" font-size="56"
      text-anchor="middle" fill="${PAPER}">p.</text>`,
},
{
  name:'Spiral notebook p', tag:'sketch',
  desc:'A scrap of spiral-bound paper, coils down the left edge, p. in serif. Says "sketchbook" before you read a letter.',
  draw:(fg)=>`
    <rect x="22" y="12" width="64" height="76" rx="5" fill="${CARD}" stroke="#cdbf9f" stroke-width="1.5"/>
    ${[20,36,52,68].map(y=>`<rect x="12" y="${y}" width="22" height="7" rx="3.5" fill="none" stroke="${fg}" stroke-width="3.4"/>`).join('')}
    <text x="58" y="64" font-family="Fraunces,serif" font-weight="900" font-size="50"
      text-anchor="middle" fill="${ORANGE}">p.</text>`,
},
{
  name:'Wax seal p', tag:'symbol',
  desc:'A pressed wax seal stamped with p — the pen-pal / calling-card spirit of the connect page. Warm, intimate, a little formal.',
  draw:(fg)=>`
    <defs><radialGradient id="wax" cx="40%" cy="35%" r="75%">
      <stop offset="0" stop-color="${HOT}"/><stop offset="1" stop-color="${RUST}"/></radialGradient></defs>
    <path d="M50 8 ${Array.from({length:24},(_,i)=>{const a=i/24*Math.PI*2,r=i%2?38:44;return `L${(50+Math.sin(a)*r).toFixed(1)} ${(50-Math.cos(a)*r).toFixed(1)}`}).join(' ')} Z"
      fill="url(#wax)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="${RUST}" stroke-width="2" opacity=".5"/>
    <text x="50" y="68" font-family="Fraunces,serif" font-weight="900" font-size="46"
      text-anchor="middle" fill="${RUST}" opacity=".55">p</text>`,
},
{
  name:'Pop-art starburst', tag:'symbol',
  desc:'The music page\'s pop-art starburst, shrunk to a mark — p. on a hard-edged comic burst. Loud, joyful, unmistakable in a tab.',
  draw:(fg)=>`
    <path d="M50 4 ${Array.from({length:16},(_,i)=>{const a=i/16*Math.PI*2,r=i%2?46:34;return `L${(50+Math.sin(a)*r).toFixed(1)} ${(50-Math.cos(a)*r).toFixed(1)}`}).join(' ')} Z"
      fill="${HOT}"/>
    <circle cx="50" cy="50" r="26" fill="${INK}"/>
    <text x="48" y="66" font-family="Fraunces,serif" font-weight="900" font-size="40"
      text-anchor="middle" fill="${CREAM}">p.</text>`,
},
{
  name:'Halftone dot p', tag:'symbol',
  desc:'A risograph halftone disc fading orange→purple with the p. knocked out — the riso-zine texture as an icon.',
  draw:(fg)=>{let dots='';for(let y=10;y<90;y+=8){for(let x=10;x<90;x+=8){const t=(x-10)/80;const r=1.1+2.8*(1-Math.abs(0.5-(y-10)/80)*2*0.4);const col=t<.5?ORANGE:PURPLE;dots+=`<circle cx="${x}" cy="${y}" r="${r.toFixed(2)}" fill="${col}"/>`}}return `
    <clipPath id="ch"><circle cx="50" cy="50" r="42"/></clipPath>
    <g clip-path="url(#ch)">${dots}</g>
    <text x="48" y="70" font-family="Fraunces,serif" font-weight="900" font-size="60"
      text-anchor="middle" fill="${PAPER}" stroke="${PAPER}" stroke-width="3">p.</text>`},
},
{
  name:'Coffee-ring p', tag:'sketch',
  desc:'A desk-stain coffee ring with p. inside — the lived-in, "this page has been worked at" feeling. Quiet and human.',
  draw:(fg)=>`
    <circle cx="50" cy="50" r="38" fill="none" stroke="${RUST}" stroke-width="5" opacity=".5"/>
    <circle cx="50" cy="50" r="38" fill="${RUST}" opacity=".06"/>
    <path d="M62 16 a40 40 0 0 1 22 30" fill="none" stroke="${RUST}" stroke-width="3" opacity=".3"/>
    <text x="50" y="68" font-family="Caveat,cursive" font-weight="700" font-size="58"
      text-anchor="middle" fill="${INK}">p.</text>`,
},
{
  name:'Pencil tip', tag:'symbol',
  desc:'A sharpened pencil point, graphite tip up — the tool of the homepage doodles. Wood, lead, a dab of orange paint.',
  draw:(fg)=>`
    <path d="M50 8 L66 40 L34 40 Z" fill="#e8d9b4"/>
    <path d="M50 8 L58 24 L42 24 Z" fill="${INK}"/>
    <path d="M50 8 L55 18 L45 18 Z" fill="${HOT}"/>
    <rect x="34" y="40" width="32" height="46" fill="${HOT}"/>
    <rect x="34" y="40" width="32" height="46" fill="none" stroke="${RUST}" stroke-width="2"/>
    <rect x="34" y="78" width="32" height="8" fill="${PURPLE}"/>`,
},
{
  name:'Margin doodle p', tag:'sketch',
  desc:'p. drawn in Caveat with a quick underline swoosh and a tiny orbiting star — exactly how it appears in the site\'s hand-notes.',
  draw:(fg)=>`
    <text x="46" y="62" font-family="Caveat,cursive" font-weight="700" font-size="64"
      text-anchor="middle" fill="${fg}">p.</text>
    <path d="M16 74 C34 66 64 66 84 73" fill="none" stroke="${ORANGE}" stroke-width="4" stroke-linecap="round"/>
    <path d="M74 22 l3 7 7 1 -5 5 1.5 7 -6.5 -4 -6.5 4 1.5 -7 -5 -5 7 -1 z" fill="${PURPLE}"/>`,
},
{
  name:'Refined squircle p.', tag:'wordmark',
  desc:'The current mark, kept but warmed: gradient squircle, geometric p. Familiar, safe, the most "app-store" of the set.',
  draw:(fg)=>`
    <defs><linearGradient id="g0" x1="10" y1="6" x2="90" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="${HOT}"/><stop offset=".55" stop-color="#e0653f"/><stop offset="1" stop-color="${PSOFT}"/>
    </linearGradient></defs>
    <rect x="3" y="3" width="94" height="94" rx="26" fill="url(#g0)"/>
    <rect x="32" y="26" width="12.5" height="55" rx="6.25" fill="${CREAM}"/>
    <circle cx="51.5" cy="45.5" r="19.5" fill="${CREAM}"/>
    <circle cx="54" cy="45.5" r="8.6" fill="url(#g0)"/>
    <circle cx="70.5" cy="74.5" r="6.2" fill="${CREAM}"/>`,
},
{
  name:'Torn-paper p', tag:'sketch',
  desc:'A torn page corner with serif p. on the ragged scrap — echoes the "torn journal sheet" post layout. Editorial + handmade.',
  draw:(fg)=>`
    <path d="M18 14 L82 14 L82 70 Q70 74 70 80 Q56 76 50 82 Q40 78 30 84 Q22 78 18 82 Z"
      fill="${CARD}" stroke="#cdbf9f" stroke-width="1.5"/>
    <text x="50" y="58" font-family="Fraunces,serif" font-weight="900" font-size="48"
      text-anchor="middle" fill="${INK}">p.</text>
    <circle cx="64" cy="32" r="4" fill="${ORANGE}"/>`,
},
{
  name:'Mixtape reel p', tag:'symbol',
  desc:'A cassette hub / reel referencing the mixtape music page; p. as the spindle window. For when music is the through-line.',
  draw:(fg)=>`
    <circle cx="50" cy="50" r="40" fill="none" stroke="${fg}" stroke-width="6"/>
    ${[0,60,120,180,240,300].map(a=>`<rect x="48.5" y="14" width="3" height="12" rx="1.5" fill="${fg}" transform="rotate(${a} 50 50)"/>`).join('')}
    <circle cx="50" cy="50" r="20" fill="${ORANGE}"/>
    <text x="49" y="60" font-family="Fraunces,serif" font-weight="900" font-size="26"
      text-anchor="middle" fill="${CREAM}">p.</text>`,
},
{
  name:'Monogram pm', tag:'wordmark',
  desc:'Interlocked p + m (Pramit Mazumder) in a serif ligature on a warm chip — initials, slightly more grown-up/identity-forward.',
  draw:(fg)=>`
    <rect x="6" y="6" width="88" height="88" rx="22" fill="${INK}"/>
    <text x="50" y="70" font-family="Fraunces,serif" font-weight="600" font-size="52"
      text-anchor="middle" fill="${CREAM}">pm</text>
    <circle cx="74" cy="30" r="6" fill="${ORANGE}"/>`,
},
];

const grid=document.getElementById('grid');
icons.forEach((ic,i)=>{
  const inner=ic.draw(INK);
  const innerDark=ic.draw(CREAM);
  const svg=(s,fg)=>`<svg viewBox="0 0 100 100" class="${s}" xmlns="http://www.w3.org/2000/svg">${fg}</svg>`;
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="num">${i+1}</div>
    <div class="name">${ic.name}</div>
    <div class="desc">${ic.desc}</div>
    <div class="stage">
      <div class="col">${svg('s64',inner)}<div class="lab">64</div></div>
      <div class="col">${svg('s32',inner)}<div class="lab">32</div></div>
      <div class="col">${svg('s16',inner)}<div class="lab">16</div></div>
      <div class="col" style="margin-left:auto">
        <div class="appicon"><svg viewBox="0 0 100 100" style="width:46px;height:46px;background:${CARD}">${inner}</svg></div>
        <div class="lab">app</div>
      </div>
    </div>
    <div class="stage dark">
      <div class="col">${svg('s32',innerDark)}<div class="lab">32 night</div></div>
      <div class="col">${svg('s16',innerDark)}<div class="lab">16</div></div>
      <div class="col" style="margin-left:auto">
        <div class="tab"><svg viewBox="0 0 100 100" style="width:16px;height:16px">${inner}</svg><span>pramit.gg</span></div>
      </div>
    </div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
